<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Ripas/Rodaforros – Liberação · By Arabi</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <header>
      <div class="marca">
        <div class="marca-arco" aria-hidden="true"></div>
        <div class="marca-linha1">B<span class="marca-y-letra">Y</span> ARABI</div>
        <div class="marca-divisor"></div>
        <div class="marca-linha2">PLANEJADOS</div>
      </div>
      <h1>Calculadora de Ripas/Rodaforros – <em>Liberação</em></h1>
      <p class="header-subtitle">Rodaforros e Ripas</p>
    </header>

    <main>
      <section id="parametros">
        <div class="params-chips">
          <div class="chip">
            <span class="chip-label">Barra</span>
            <span class="chip-value">2700 mm</span>
          </div>
          <div class="chip">
            <span class="chip-label">Perda por corte</span>
            <span class="chip-value">5 mm</span>
          </div>
        </div>
      </section>

      <section id="entradas">
        <div id="linhas-container">
          <div class="linha-medida">
            <input type="number" class="campo-comprimento" placeholder="Comprimento (mm)" min="1" max="2700">
            <input type="number" class="campo-quantidade" placeholder="Qtd" min="1">
            <button class="btn-remover" aria-label="Remover linha">×</button>
          </div>
        </div>
        <button id="btn-adicionar" class="btn-secondary">+ Adicionar Medida</button>
        <button id="btn-calcular" class="btn-primary">Calcular</button>
      </section>

      <section id="resultado" class="hidden">
        <div class="result-block">
          <p id="total-barras"></p>
        </div>
        <div id="resumo-medidas"></div>
        <button id="btn-toggle-detalhamento" class="btn-secondary" type="button">Ver detalhamento completo</button>
        <div id="detalhamento" class="hidden"></div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
